<svg viewBox="0 0 800 350" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f7f5f0" rx="15" stroke="#e6e1d5" stroke-width="1"/>
  <text x="400" y="50" font-family="\x27Tajawal\x27, sans-serif" font-size="24" fill="#2e2620" font-weight="bold" text-anchor="middle">التوصيات والقرار المطلوب</text>
  
  <g transform="translate(100, 120)">
    <circle cx="40" cy="40" r="30" fill="#689f38" opacity="0.2"/>
    <text x="40" y="47" font-family="\x27Tajawal\x27, sans-serif" font-size="20" fill="#689f38" font-weight="bold" text-anchor="middle">1</text>
    <text x="90" y="35" font-family="\x27Tajawal\x27, sans-serif" font-size="16" fill="#2e2620" font-weight="bold">الاعتماد المبدئي</text>
    <text x="90" y="60" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#6e655f">تبني المشروع كشراكة استراتيجية</text>
  </g>

  <g transform="translate(100, 220)">
    <circle cx="40" cy="40" r="30" fill="#3b82f6" opacity="0.2"/>
    <text x="40" y="47" font-family="\x27Tajawal\x27, sans-serif" font-size="20" fill="#3b82f6" font-weight="bold" text-anchor="middle">2</text>
    <text x="90" y="35" font-family="\x27Tajawal\x27, sans-serif" font-size="16" fill="#2e2620" font-weight="bold">لجنة التوجيه والتمويل</text>
    <text x="90" y="60" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#6e655f">تأمين ميزانية المرحلة الأولى</text>
  </g>
</svg>