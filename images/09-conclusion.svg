    <text x="90" y="35" font-family="'Tajawal', sans-serif" font-size="16" fill="#ffffff" font-weight="bold">لجنة التوجيه والتمويل</text>
    <text x="90" y="60" font-family="'Tajawal', sans-serif" font-size="14" fill="#9ca3af">تأمين ميزانية المرحلة الأولى</text>
