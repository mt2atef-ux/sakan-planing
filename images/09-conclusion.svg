<svg viewBox="0 0 800 350" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#121824" rx="15" />
  <text x="400" y="50" font-family="'Tajawal', sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">التوصيات والقرار المطلوب</text>
  
  <g transform="translate(100, 120)">
    <circle cx="40" cy="40" r="30" fill="#10b981" opacity="0.2"/>
