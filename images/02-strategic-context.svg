<svg viewBox="0 0 800 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f7f5f0" rx="15" stroke="#e6e1d5" stroke-width="1"/>
  <text x="400" y="50" font-family="\x27Tajawal\x27, sans-serif" font-size="24" fill="#2e2620" font-weight="bold" text-anchor="middle">تحديات الواقع وأهداف التغيير</text>
  
  <g transform="translate(100, 120)">
    <rect width="250" height="200" fill="#ef4444" rx="10" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
    <text x="125" y="40" font-family="\x27Tajawal\x27, sans-serif" font-size="18" fill="#ef4444" font-weight="bold" text-anchor="middle">التحديات الراهنة</text>
    <text x="125" y="90" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#2e2620" text-anchor="middle">عزلة تامة بين الجمعيات</text>
    <text x="125" y="120" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#2e2620" text-anchor="middle">25% هدر نتيجة التكرار</text>
    <text x="125" y="150" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#2e2620" text-anchor="middle">ضياع المعرفة برحيل الأفراد</text>
  </g>
  
  <g transform="translate(450, 120)">
    <rect width="250" height="200" fill="#689f38" rx="10" opacity="0.1" stroke="#689f38" stroke-width="1.5"/>
    <text x="125" y="40" font-family="\x27Tajawal\x27, sans-serif" font-size="18" fill="#689f38" font-weight="bold" text-anchor="middle">المستهدفات بالمنظومة</text>
    <text x="125" y="90" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#2e2620" text-anchor="middle">تكامل قطاعي منسق</text>
    <text x="125" y="120" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#2e2620" text-anchor="middle">تعظيم كفاءة الموارد</text>
    <text x="125" y="150" font-family="\x27Tajawal\x27, sans-serif" font-size="14" fill="#2e2620" text-anchor="middle">مأسسة المعرفة بالكامل</text>
  </g>
</svg>