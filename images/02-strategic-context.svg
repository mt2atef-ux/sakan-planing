  </g>
  
  <g transform="translate(450, 120)">
    <rect width="250" height="200" fill="#10b981" rx="10" opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
    <text x="125" y="40" font-family="'Tajawal', sans-serif" font-size="18" fill="#10b981" font-weight="bold" text-anchor="middle">المستهدفات بالمنظومة</text>
