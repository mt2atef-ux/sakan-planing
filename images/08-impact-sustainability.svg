<svg viewBox="0 0 800 350" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f7f5f0" rx="15" stroke="#e6e1d5" stroke-width="1"/>
  <text x="400" y="50" font-family="\x27Tajawal\x27, sans-serif" font-size="24" fill="#2e2620" font-weight="bold" text-anchor="middle">القيمة المضافة والأثر المستدام</text>
  
  <g transform="translate(100, 120)">
    <rect width="180" height="150" fill="#1f2937" rx="10" stroke="#689f38" stroke-width="1.5" />
    <text x="90" y="45" font-family="\x27Tajawal\x27, sans-serif" font-size="16" fill="#689f38" font-weight="bold" text-anchor="middle">للجمعيات</text>
    <text x="90" y="90" font-family="\x27Tajawal\x27, sans-serif" font-size="13" fill="#2e2620" text-anchor="middle">تحويل الخبرة لكيان</text>
    <text x="90" y="120" font-family="\x27Tajawal\x27, sans-serif" font-size="13" fill="#2e2620" text-anchor="middle">تقليص تكاليف التشغيل</text>
  </g>

  <g transform="translate(310, 120)">
    <rect width="180" height="150" fill="#1f2937" rx="10" stroke="#3b82f6" stroke-width="1.5" />
    <text x="90" y="45" font-family="\x27Tajawal\x27, sans-serif" font-size="16" fill="#3b82f6" font-weight="bold" text-anchor="middle">لمركز الدعم</text>
    <text x="90" y="90" font-family="\x27Tajawal\x27, sans-serif" font-size="13" fill="#2e2620" text-anchor="middle">أداة رقابة موحدة</text>
    <text x="90" y="120" font-family="\x27Tajawal\x27, sans-serif" font-size="13" fill="#2e2620" text-anchor="middle">بيانات تراكمية للأثر</text>
  </g>

  <g transform="translate(520, 120)">
    <rect width="180" height="150" fill="#1f2937" rx="10" stroke="#d2a679" stroke-width="1.5" />
    <text x="90" y="45" font-family="\x27Tajawal\x27, sans-serif" font-size="16" fill="#d2a679" font-weight="bold" text-anchor="middle">للمجتمع</text>
    <text x="90" y="90" font-family="\x27Tajawal\x27, sans-serif" font-size="13" fill="#2e2620" text-anchor="middle">خدمات متكاملة وسريعة</text>
    <text x="90" y="120" font-family="\x27Tajawal\x27, sans-serif" font-size="13" fill="#2e2620" text-anchor="middle">تنمية حقيقية مستدامة</text>
  </g>
</svg>